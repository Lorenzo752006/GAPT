behaviors:
  EnemyTracker:
    trainer_type: ppo
    hyperparameters:
      batch_size: 512
      buffer_size: 10240 
      learning_rate: 1.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      use_recurrent: true   #LSTM memory — helps with partial observability in mazes
      sequence_length: 64
      memory_size: 256
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    max_steps: 3000000    # 1,000,000 for basic, 3,000,000 for complex
    time_horizon: 512          
    summary_freq: 5000         